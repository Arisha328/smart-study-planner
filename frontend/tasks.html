<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Tasks - Smart Study Planner</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="tasks">

  <div id="layout-root"></div>

  <div class="main-content" id="main-content">

    <!-- Filters -->
    <div class="glass-card p-3 mb-4 fade-in-up">
      <div class="row g-2 align-items-center">
        <div class="col-md-4">
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-search"></i></span>
            <input type="text" class="form-control border-start-0" id="searchInput" placeholder="Search tasks...">
          </div>
        </div>
        <div class="col-md-2">
          <select class="form-select" id="priorityFilter">
            <option value="">All Priorities</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="col-md-2">
          <select class="form-select" id="statusFilter">
            <option value="">All Status</option>
            <option value="false">Pending</option>
            <option value="true">Completed</option>
          </select>
        </div>
        <div class="col-md-2">
          <select class="form-select" id="sortFilter">
            <option value="dueDate">Due Date ↑</option>
            <option value="-dueDate">Due Date ↓</option>
            <option value="priority">Priority</option>
          </select>
        </div>
        <div class="col-md-2 text-end">
          <button class="btn btn-gradient w-100" onclick="openTaskModal()"><i class="fas fa-plus me-2"></i>Add Task</button>
        </div>
      </div>
    </div>

    <div id="tasksList">
      <div class="text-center text-secondary py-5">Loading tasks...</div>
    </div>

  </div>

  <!-- Task Modal -->
  <div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card border-0">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold" id="taskModalTitle">Add Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="taskForm">
          <div class="modal-body">
            <input type="hidden" id="taskId">
            <div class="mb-3">
              <label class="form-label">Task Title</label>
              <input type="text" class="form-control" id="taskTitle" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Subject</label>
              <select class="form-select" id="taskSubject">
                <option value="">General</option>
              </select>
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Due Date</label>
                <input type="date" class="form-control" id="taskDueDate" required>
              </div>
              <div class="col-6 mb-3">
                <label class="form-label">Priority</label>
                <select class="form-select" id="taskPriority">
                  <option value="Low">Low</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="High">High</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Estimated Time (minutes)</label>
              <input type="number" class="form-control" id="taskEstimate" min="0" value="60">
            </div>
            <div class="mb-3">
              <label class="form-label">Notes</label>
              <textarea class="form-control" id="taskNotes" rows="3"></textarea>
            </div>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-outline-gradient" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-gradient" id="saveTaskBtn">Save Task</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/ai-assistant.js"></script>
  <script src="js/tasks.js"></script>
</body>
</html>

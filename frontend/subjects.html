<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subjects - Smart Study Planner</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="subjects">

  <div id="layout-root"></div>

  <div class="main-content" id="main-content">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <div class="input-group" style="max-width: 320px;">
        <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-search"></i></span>
        <input type="text" class="form-control border-start-0" id="searchInput" placeholder="Search subjects...">
      </div>
      <button type="button" class="btn btn-gradient" data-bs-toggle="modal" data-bs-target="#subjectModal" onclick="openSubjectModal()">
        <i class="fas fa-plus me-2"></i>Add Subject
      </button>
    </div>

    <div class="row g-3" id="subjectsGrid">
      <div class="text-center text-secondary py-5 col-12">Loading subjects...</div>
    </div>

  </div>

  <!-- Subject Modal -->
  <div class="modal fade" id="subjectModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card border-0">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold" id="subjectModalTitle">Add Subject</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="subjectForm">
          <div class="modal-body">
            <input type="hidden" id="subjectId">
            <div class="mb-3">
              <label class="form-label" for="subjectName">Subject Name</label>
              <input type="text" class="form-control" id="subjectName" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="instructor">Instructor Name</label>
              <input type="text" class="form-control" id="instructor">
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label" for="credits">Credits</label>
                <input type="number" class="form-control" id="credits" min="0" value="3">
              </div>
              <div class="col-6 mb-3">
                <label class="form-label" for="priority">Priority</label>
                <select class="form-select" id="priority">
                  <option value="Low">Low</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="High">High</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="colorTag">Color Tag</label>
              <input type="color" class="form-control form-control-color w-100" id="colorTag" value="#6366F1">
            </div>
            <div class="mb-3">
              <label class="form-label" for="progress">Progress (%)</label>
              <input type="range" class="form-range" id="progress" min="0" max="100" value="0">
              <div class="text-center small text-secondary"><span id="progressValue">0</span>%</div>
            </div>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-outline-gradient" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-gradient" id="saveSubjectBtn">Save Subject</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/subjects.js"></script>
</body>
</html>

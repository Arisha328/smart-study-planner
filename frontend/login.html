<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Smart Study Planner</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="glass-card auth-card fade-in-up">
      <div class="text-center mb-4">
        <a href="index.html" class="brand-logo gradient-text"><i class="fas fa-graduation-cap"></i> Smart Study Planner</a>
        <h4 class="fw-bold mt-3 mb-1">Welcome back</h4>
        <p class="text-secondary">Login to continue your study journey</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required minlength="6">
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>
        <button type="submit" class="btn btn-gradient w-100 mb-3" id="loginBtn">
          <i class="fas fa-right-to-bracket me-2"></i>Login
        </button>
        <p class="text-center text-secondary mb-0">Don't have an account? <a href="signup.html" class="gradient-text fw-semibold">Sign up</a></p>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    redirectIfAuthenticated();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;

      if (!form.checkValidity()) {
        form.classList.add('was-validated');
        return;
      }

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Logging in...';

      try {
        const res = await api.post('/auth/login', { email, password }, false);
        saveAuthData(res.data);
        showToast('Welcome back! Redirecting...', 'success');
        setTimeout(() => (window.location.href = 'dashboard.html'), 600);
      } catch (err) {
        showToast(err.message, 'danger');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-right-to-bracket me-2"></i>Login';
      }
    });
  </script>
</body>
</html>

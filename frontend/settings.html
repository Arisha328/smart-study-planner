<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Smart Study Planner</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="settings">

  <div id="layout-root"></div>

  <div class="main-content" id="main-content">
    <div class="row g-4">

      <!-- Appearance -->
      <div class="col-lg-6">
        <div class="glass-card p-4 fade-in-up">
          <h6 class="fw-bold mb-4"><i class="fas fa-palette text-primary me-2"></i>Appearance</h6>
          <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
            <div>
              <div class="fw-semibold">Dark Mode</div>
              <div class="small text-secondary">Switch between light and dark theme</div>
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" role="switch" id="darkModeToggle">
            </div>
          </div>
        </div>
      </div>

      <!-- Notifications -->
      <div class="col-lg-6">
        <div class="glass-card p-4 fade-in-up">
          <h6 class="fw-bold mb-4"><i class="fas fa-bell text-primary me-2"></i>Notifications</h6>
          <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
            <div>
              <div class="fw-semibold">Email Notifications</div>
              <div class="small text-secondary">Receive updates via email</div>
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" role="switch" id="emailNotifToggle">
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center py-3">
            <div>
              <div class="fw-semibold">Study Reminders</div>
              <div class="small text-secondary">Get reminded before scheduled sessions</div>
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" role="switch" id="reminderToggle">
            </div>
          </div>
          <button class="btn btn-gradient btn-sm" id="saveNotifBtn">Save Notification Settings</button>
        </div>
      </div>

      <!-- Change Password -->
      <div class="col-lg-6">
        <div class="glass-card p-4 fade-in-up">
          <h6 class="fw-bold mb-4"><i class="fas fa-lock text-primary me-2"></i>Change Password</h6>
          <form id="passwordForm">
            <div class="mb-3">
              <label class="form-label">Current Password</label>
              <input type="password" class="form-control" id="currentPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" class="form-control" id="newPassword" required minlength="6">
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm New Password</label>
              <input type="password" class="form-control" id="confirmPassword" required minlength="6">
            </div>
            <button type="submit" class="btn btn-gradient" id="changePassBtn">
              <i class="fas fa-key me-2"></i>Change Password
            </button>
          </form>
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="col-lg-6">
        <div class="glass-card p-4 fade-in-up" style="border: 1px solid rgba(239,68,68,0.25);">
          <h6 class="fw-bold mb-4 text-danger"><i class="fas fa-triangle-exclamation me-2"></i>Danger Zone</h6>
          <p class="text-secondary small mb-3">These actions are irreversible. Please proceed with caution.</p>
          <button class="btn btn-outline-danger" onclick="logout()">
            <i class="fas fa-right-from-bracket me-2"></i>Logout
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
